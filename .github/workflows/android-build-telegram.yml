name: Android CI - Build & Send APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stable-app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Send APK to Telegram (best-effort)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not configured, skipping upload."
            exit 0
          fi

          if [ ! -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "APK not found, skipping Telegram upload."
            exit 0
          fi

          set +e
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@app/build/outputs/apk/release/app-release.apk \
            -F caption="Stable App - latest release from GitHub Actions"
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "Telegram upload failed with exit code $CURL_EXIT, but build succeeded. Ignoring."
          fi
          exit 0

